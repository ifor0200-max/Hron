<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warehouse OS</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0B0B0C; --card: #121214; --surface: #18181B; --border: #232329;
            --text: #F3F4F6; --muted: #A1A1AA; --green: #22C55E; --orange: #F59E0B;
            --red: #EF4444; --accent: #60A5FA;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 11px; }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 12px; }
        
        /* HEADER & UI CONTROLS */
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .nav-group { display: flex; gap: 4px; overflow-x: auto; }
        .btn-ui { background: var(--card); border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; font-weight: 600; white-space: nowrap; }
        .btn-ui.active { border-color: var(--accent); color: var(--accent); background: rgba(96, 165, 250, 0.1); }
        .debug-toggle { color: var(--orange); border-color: var(--orange); margin-left: 10px; }
        .debug-active { background: var(--orange) !important; color: #000 !important; }

        /* GRID */
        #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 6px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px; display: flex; flex-direction: column; position: relative; }
        .card:hover { border-color: #333; }
        
        .item-info { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .icon { font-size: 16px; width: 24px; text-align: center; }
        .title { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
        
        .craft-text { font-size: 9px; color: var(--muted); line-height: 1.1; margin-bottom: 6px; min-height: 20px; }
        .craft-text b { color: var(--text); }

        .controls { display: flex; justify-content: space-between; align-items: center; background: var(--surface); padding: 2px 4px; border-radius: 4px; }
        .count { font-family: 'JetBrains Mono'; font-size: 14px; }
        .qty-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 0 6px; font-size: 16px; font-weight: bold; }
        .qty-btn:hover { color: var(--text); }
        
        .btn-build { width: 100%; margin-top: 4px; background: rgba(96, 165, 250, 0.15); border: 1px solid var(--accent); color: var(--accent); border-radius: 4px; padding: 2px; font-size: 9px; cursor: pointer; text-transform: uppercase; font-weight: 700; }
        .btn-build:disabled { opacity: 0.1; cursor: not-allowed; border-color: var(--border); color: var(--muted); }

        /* DASHBOARD */
        #dashboard { display: none; padding: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
        .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: center; }
        .stat-box h3 { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
        .stat-val { font-size: 32px; font-family: 'JetBrains Mono'; }

        #toasts { position: fixed; bottom: 10px; right: 10px; z-index: 99; }
        .toast { background: var(--surface); border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; font-size: 10px; margin-top: 4px; border-left: 3px solid var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="nav-group">
            <button class="btn-ui active" onclick="setView('all')">ВСЕ</button>
            <button class="btn-ui" onclick="setView('shells')">РАКУШКИ</button>
            <button class="btn-ui" onclick="setView('meds')">ТРАВЫ</button>
            <button class="btn-ui" onclick="setView('dashboard')">📊 СТАТИСТИКА</button>
        </div>
        <div>
            <input type="text" id="search" class="btn-ui" placeholder="Поиск..." oninput="render()">
            <button id="debug-btn" class="btn-ui debug-toggle" onclick="toggleDebug()">DEBUG: OFF</button>
        </div>
    </header>

    <div id="grid"></div>

    <div id="dashboard">
        <div class="stat-grid">
            <div class="stat-box"><h3>ВСЕГО ПРЕДМЕТОВ</h3><div class="stat-val" id="st-total">0</div></div>
            <div class="stat-box"><h3>ПРИБЫЛЬ</h3><div class="stat-val" style="color:var(--green)" id="st-in">0</div></div>
            <div class="stat-box"><h3>УБЫЛЬ</h3><div class="stat-val" style="color:var(--red)" id="st-out">0</div></div>
        </div>
        <div style="margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px;">
            <div><h3 style="color:var(--muted); margin-bottom:10px">ПОПУЛЯРНЫЕ</h3><div id="st-pop"></div></div>
            <div><h3 style="color:var(--muted); margin-bottom:10px">ДЕФИЦИТ</h3><div id="st-low"></div></div>
        </div>
    </div>
</div>

<div id="toasts"></div>

<script>
    const SB_URL = 'https://bghppzchqmxpdnhpzirv.supabase.co';
    const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnaHBwemNocW14cGRuaHB6aXJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTM0MTksImV4cCI6MjA5MjE2OTQxOX0.9fbU2WvZVMCadO90XZ3zu1S-2LdRlwW0C0SUUehMgy4';
    const sb = supabase.createClient(SB_URL, SB_KEY);

    let items = [];
    let curView = 'all';
    let isDebug = false;
    let history = { in: 0, out: 0, pop: {} };

    const COLORS = ['Черный', 'Синий', 'Желтый', 'Красный', 'Зеленый', 'Белый'];
    const RECIPES = {};

    // 1. Ошейники и Веревки (все цвета)
    COLORS.forEach(c => {
        RECIPES[`${c} ошейник`] = {[`${c} ткань`]: 3};
        RECIPES[`${c} веревка`] = {[`${c} ткань`]: 3};
    });

    // 2. Бантики
    RECIPES['Синий бантик'] = {'Синяя ткань': 3};
    RECIPES['Желтый бантик'] = {'Желтая ткань': 3};

    // 3. Поделки из бумаги, кораблик, олень (1, 2, 3 уровни одинаковы)
    ['Поделка из бумаги', 'Кораблик в бутылке', 'Олень'].forEach(item => {
        RECIPES[`${item} 1 ур.`] = {'Бумага': 2, 'Клей': 1};
        RECIPES[`${item} 2 ур.`] = {'Бумага': 4, 'Клей': 2};
        RECIPES[`${item} 3 ур.`] = {'Бумага': 6, 'Клей': 3};
    });

    // 4. Грузы
    [2,3,4,5].forEach(lvl => {
        RECIPES[`Груз ${lvl} ур.`] = {'Брусок': lvl, 'Синяя ткань': 1};
    });

    async function sync() {
        const { data } = await sb.from('resources').select('*').order('title');
        items = data || [];
        render();
    }

    function toggleDebug() {
        isDebug = !isDebug;
        const btn = document.getElementById('debug-btn');
        btn.innerText = `DEBUG: ${isDebug ? 'ON' : 'OFF'}`;
        btn.classList.toggle('debug-active', isDebug);
    }

    function setView(v) {
        curView = v;
        document.querySelectorAll('.btn-ui').forEach(b => b.classList.toggle('active', b.onclick.toString().includes(v)));
        render();
    }

    function render() {
        const grid = document.getElementById('grid');
        const dash = document.getElementById('dashboard');
        const search = document.getElementById('search').value.toLowerCase();

        if (curView === 'dashboard') {
            grid.style.display = 'none'; dash.style.display = 'block';
            drawStats(); return;
        }

        grid.style.display = 'grid'; dash.style.display = 'none';
        const filt = items.filter(i => (curView==='all' || i.category===curView) && i.title.toLowerCase().includes(search));

        grid.innerHTML = filt.map(i => {
            const rec = RECIPES[i.title];
            const hasMats = rec ? Object.entries(rec).every(([n, q]) => (items.find(x=>x.title===n)?.count||0) >= q) : true;
            const recStr = rec ? Object.entries(rec).map(([n,q]) => `${n} x${q}`).join(', ') : '';

            return `
                <div class="card">
                    <div class="item-info">
                        <div class="icon">${getEmoji(i.category)}</div>
                        <div class="title">${i.title}</div>
                    </div>
                    <div class="craft-text">${rec ? '<b>Нужно:</b> '+recStr : ''}</div>
                    <div class="controls">
                        <button class="qty-btn" onclick="update(${i.id}, -1)">−</button>
                        <div class="count" style="color:${i.count<3?'#EF4444':'#FFF'}">${i.count}</div>
                        <button class="qty-btn" onclick="update(${i.id}, 1)">+</button>
                    </div>
                    ${rec ? `<button class="btn-build" ${!hasMats?'disabled':''} onclick="craft('${i.title}')">Крафт</button>` : ''}
                </div>
            `;
        }).join('');
    }

    async function update(id, delta) {
        const item = items.find(i => i.id === id);
        if (item.count + delta < 0) return;

        const { error } = await sb.from('resources').update({ count: item.count + delta }).eq('id', id);
        if (!error) {
            if (!isDebug) {
                if (delta > 0) history.in++; else history.out++;
                history.pop[item.title] = (history.pop[item.title] || 0) + 1;
            }
            sync();
        }
    }

    async function craft(title) {
        const rec = RECIPES[title];
        for (const [name, qty] of Object.entries(rec)) {
            const ing = items.find(x => x.title === name);
            await sb.from('resources').update({ count: ing.count - qty }).eq('id', ing.id);
        }
        const target = items.find(x => x.title === title);
        await sb.from('resources').update({ count: target.count + 1 }).eq('id', target.id);
        if (!isDebug) history.in++;
        toast(`Готово: ${title}`);
        sync();
    }

    function drawStats() {
        document.getElementById('st-total').innerText = items.reduce((a,b) => a + b.count, 0);
        document.getElementById('st-in').innerText = history.in;
        document.getElementById('st-out').innerText = history.out;
        
        const low = items.filter(i => i.count < 3).sort((a,b)=>a.count-b.count).slice(0,5);
        document.getElementById('st-low').innerHTML = low.map(i => `<div style="padding:4px 0; border-bottom:1px solid var(--border)">${i.title} <b style="color:var(--red); float:right">${i.count}</b></div>`).join('');
        
        const popular = Object.entries(history.pop).sort((a,b)=>b[1]-a[1]).slice(0,5);
        document.getElementById('st-pop').innerHTML = popular.map(p => `<div style="padding:4px 0; border-bottom:1px solid var(--border)">${p[0]} <b style="color:var(--accent); float:right">${p[1]}</b></div>`).join('');
    }

    function getEmoji(c) { return {'shells':'🐚','feathers':'🪶','meds':'🌿','pets':'🐾'}[c] || '📦'; }
    function toast(m) {
        const t = document.createElement('div'); t.className = 'toast'; t.innerText = m;
        document.getElementById('toasts').appendChild(t);
        setTimeout(() => t.remove(), 2500);
    }

    sync();
    sb.channel('db').on('postgres_changes',{event:'*',schema:'public',table:'resources'},sync).subscribe();
</script>
</body>
</html>
