<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Склад Ресурсов</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #08090B;
            --surface: #0F1014;
            --border:  #1E2028;
            --border-h:#2E8FFF;
            --text:    #E8EAF0;
            --muted:   #6B7280;
            --green:   #22C55E;
            --blue:    #3B82F6;
            --red:     #EF4444;
            --amber:   #F59E0B;
            --cyan:    #22D3EE;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
        }

        /* ── TOAST ── */
        #toast-container {
            position: fixed; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 8px;
            z-index: 9999; pointer-events: none;
        }
        .toast {
            background: #1A1C22; border: 1px solid var(--border);
            padding: 10px 16px; border-radius: 10px;
            font-size: 13px; font-family: 'Space Mono', monospace;
            animation: slideIn .25s ease, fadeOut .4s ease 2.5s forwards;
            pointer-events: all;
        }
        .toast.ok  { border-left: 3px solid var(--green); }
        .toast.err { border-left: 3px solid var(--red); }
        .toast.info{ border-left: 3px solid var(--blue); }
        @keyframes slideIn  { from { opacity:0; transform:translateX(20px); } to { opacity:1; transform:none; } }
        @keyframes fadeOut  { to   { opacity:0; } }

        /* ── LAYOUT ── */
        .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 20px; }

        header {
            display: flex; flex-wrap: wrap; gap: 16px;
            align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); padding-bottom: 24px; margin-bottom: 28px;
        }
        .logo h1 {
            font-size: 26px; font-weight: 800; letter-spacing: -.5px;
            background: linear-gradient(120deg, #fff 30%, var(--cyan));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo p { color: var(--muted); font-size: 12px; margin-top: 2px; }

        .header-controls { display: flex; gap: 10px; flex-wrap: wrap; }

        input[type="text"] {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text); padding: 8px 14px; border-radius: 8px;
            font-family: 'Space Mono', monospace; font-size: 12px;
            outline: none; transition: border-color .2s; width: 220px;
        }
        input[type="text"]:focus { border-color: var(--border-h); }

        .btn {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text); padding: 8px 16px; border-radius: 8px;
            font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all .2s; white-space: nowrap;
        }
        .btn:hover { border-color: var(--border-h); }
        .btn.green { background: rgba(34,197,94,.15); border-color: rgba(34,197,94,.4); color: var(--green); }
        .btn.blue  { background: rgba(59,130,246,.15); border-color: rgba(59,130,246,.4); color: var(--blue); }
        .btn.red   { background: rgba(239,68,68,.15);  border-color: rgba(239,68,68,.4);  color: var(--red); }
        .btn.sm    { padding: 5px 10px; font-size: 11px; border-radius: 6px; }

        /* ── STATS BAR ── */
        .stats-bar {
            display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .stat-chip {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 8px; padding: 8px 14px; font-size: 12px;
            font-family: 'Space Mono', monospace;
        }
        .stat-chip b { color: var(--cyan); }

        /* ── TABS ── */
        nav {
            display: flex; gap: 6px; margin-bottom: 24px;
            overflow-x: auto; padding-bottom: 4px;
        }
        nav::-webkit-scrollbar { display: none; }
        .tab {
            background: transparent; border: 1px solid var(--border);
            color: var(--muted); padding: 7px 16px; border-radius: 8px;
            font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all .2s; white-space: nowrap;
        }
        .tab.active {
            background: rgba(34,211,238,.08);
            border-color: rgba(34,211,238,.35);
            color: var(--cyan);
        }

        /* ── GRID ── */
        #grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 14px;
        }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; padding: 16px;
            display: flex; flex-direction: column; gap: 12px;
            transition: border-color .2s, transform .15s;
        }
        .card:hover { border-color: #2a2d38; transform: translateY(-1px); }
        .card.rotten { border-color: rgba(239,68,68,.3); }

        .card-top { display: flex; gap: 12px; align-items: flex-start; }

        .card-icon {
            width: 60px; height: 60px; border-radius: 10px;
            background: #13151A; border: 1px solid var(--border);
            object-fit: cover; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px;
        }
        .card-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 9px; }

        .card-info { flex: 1; min-width: 0; }
        .card-title {
            font-size: 13px; font-weight: 700; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .badge {
            display: inline-block; margin-top: 4px;
            font-size: 10px; font-family: 'Space Mono', monospace;
            padding: 2px 7px; border-radius: 4px;
        }
        .badge.amber { background: rgba(245,158,11,.1); color: var(--amber); }
        .badge.blue  { background: rgba(59,130,246,.1);  color: #93C5FD; }
        .badge.green { background: rgba(34,197,94,.1);   color: var(--green); }

        /* ── RECIPE TOOLTIP ── */
        .recipe-hint {
            font-size: 10px; font-family: 'Space Mono', monospace;
            color: var(--muted); line-height: 1.5;
            background: #0D0E12; border: 1px solid var(--border);
            border-radius: 8px; padding: 7px 10px;
        }
        .recipe-hint b { color: var(--blue); }

        /* ── COUNT & BUTTONS ── */
        .card-bottom { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

        .count {
            font-family: 'Space Mono', monospace;
            font-size: 28px; font-weight: 700; line-height: 1;
            min-width: 40px;
        }
        .count.ok   { color: var(--green); }
        .count.warn { color: var(--amber); }
        .count.zero { color: var(--red); }

        .actions { display: flex; gap: 5px; }

        /* ── LOADING ── */
        .loading {
            grid-column: 1 / -1; text-align: center;
            color: var(--muted); font-size: 14px; padding: 60px 0;
        }
        .spinner {
            width: 28px; height: 28px; border: 2px solid var(--border);
            border-top-color: var(--cyan); border-radius: 50%;
            animation: spin .7s linear infinite; margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── REALTIME DOT ── */
        .live-dot {
            display: inline-block; width: 6px; height: 6px;
            background: var(--green); border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
            vertical-align: middle; margin-right: 5px;
        }
        @keyframes pulse {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: .4; transform: scale(.8); }
        }

        @media (max-width: 600px) {
            .wrap { padding: 16px 12px; }
            .logo h1 { font-size: 20px; }
            input[type="text"] { width: 160px; }
        }
    </style>
</head>
<body>
<div id="toast-container"></div>

<div class="wrap">
    <header>
        <div class="logo">
            <h1>УЧЕТ РЕСУРСОВ</h1>
            <p><span class="live-dot"></span>Авторасчёт крафта и гниения · Hranilishe</p>
        </div>
        <div class="header-controls">
            <input type="text" id="search" placeholder="Поиск..." oninput="loadResources()">
            <button class="btn" onclick="toggleRole()" id="role-btn">
                Режим: <span id="role-text" style="color:var(--green);font-weight:800;">Админ</span>
            </button>
        </div>
    </header>

    <div class="stats-bar" id="stats-bar"></div>

    <nav>
        <button class="tab active" data-cat="all"      onclick="setCategory('all')">Все</button>
        <button class="tab"        data-cat="shells"   onclick="setCategory('shells')">🐚 Ракушки</button>
        <button class="tab"        data-cat="feathers" onclick="setCategory('feathers')">🪶 Перья</button>
        <button class="tab"        data-cat="meds"     onclick="setCategory('meds')">🌿 Травы</button>
        <button class="tab"        data-cat="pets"     onclick="setCategory('pets')">🐾 Домашние</button>
    </nav>

    <div id="grid">
        <div class="loading"><div class="spinner"></div>Загрузка склада…</div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
//  КОНФИГУРАЦИЯ SUPABASE
//  ИСПРАВЛЕНИЕ: используем legacy JWT anon key вместо
//  sb_publishable_, т.к. CDN-версия supabase-js@2
//  не поддерживает новый формат ключа.
// ═══════════════════════════════════════════════════════
const SB_URL = 'https://bghppzchqmxpdnhpzirv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJnaHBwemNocW14cGRuaHB6aXJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY1OTM0MTksImV4cCI6MjA5MjE2OTQxOX0.9fbU2WvZVMCadO90XZ3zu1S-2LdRlwW0C0SUUehMgy4';

const sb = supabase.createClient(SB_URL, SB_KEY);

// ═══════════════════════════════════════════════════════
//  ДАННЫЕ: сроки гниения (дни)
// ═══════════════════════════════════════════════════════
const EXPIRY = {
    'Крепкая ветка':         3,
    'Целебная водоросль':    3,
    'Мед':                   3,
    'Вьюнок':                3,
    'Крепкая водоросль':     3,
    'Трава от кашля':        4,
    'Трава от отравления':   4,
};

// Эмодзи для категорий (когда нет картинки)
const CATEGORY_EMOJI = {
    shells: '🐚', feathers: '🪶', meds: '🌿', pets: '🐾',
};
const ITEM_EMOJI = {
    'Ракушка на 15':'🐚','Ракушка на 20':'🐚','Ракушка на 28':'🐚',
    'Ракушка на 30':'🐚','Ракушка за сон':'🌙',
    'Красное перо':'🔴','Синее перо':'🔵','Черное перо':'⚫',
    'Крепкая ветка':'🪵','Целебная водоросль':'🌊','Мед':'🍯',
    'Вьюнок':'🌿','Крепкая водоросль':'💧','Трава от кашля':'🫁',
    'Трава от отравления':'☠️','Паутина':'🕸️',
    'Смесь из ракушек 1 (4 исп.)':'✨','Смесь из ракушек 2 (4 исп.)':'✨',
    'Смесь из перьев (4 исп.)':'🌈',
    'Костоправ из трав':'💊','Костоправ из паутины':'🕷️',
};

// ═══════════════════════════════════════════════════════
//  СОСТОЯНИЕ
// ═══════════════════════════════════════════════════════
let currentCat = 'all';
let isAdmin    = true;
let allResources = [];   // кешируем все ресурсы для резолва рецептов

// ═══════════════════════════════════════════════════════
//  ТОСТЫ
// ═══════════════════════════════════════════════════════
function toast(msg, type = 'ok') {
    const el = document.createElement('div');
    el.className = `toast ${type}`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3000);
}

// ═══════════════════════════════════════════════════════
//  ИНИЦИАЛИЗАЦИЯ
// ═══════════════════════════════════════════════════════
async function init() {
    await processRottenLogic();
    await loadResources();
    subscribeRealtime();
}

// ═══════════════════════════════════════════════════════
//  ГНИЕНИЕ
// ═══════════════════════════════════════════════════════
async function processRottenLogic() {
    try {
        const { data, error } = await sb
            .from('expiring_items')
            .select('*, resources(title)')
            .eq('is_rotten', false);

        if (error || !data) return;

        for (const item of data) {
            const limit = EXPIRY[item.resources?.title] ?? 999;
            const days  = (Date.now() - new Date(item.created_at).getTime()) / 86400000;
            if (days >= limit) {
                await sb.rpc('update_resource_safe', { res_id: item.resource_id, delta: -1 });
                await sb.from('expiring_items').update({ is_rotten: true }).eq('id', item.id);
                toast(`⏳ Сгнило: ${item.resources?.title}`, 'err');
            }
        }
    } catch (e) {
        console.warn('Ошибка обработки гниения:', e);
    }
}

// ═══════════════════════════════════════════════════════
//  ЗАГРУЗКА ДАННЫХ
// ═══════════════════════════════════════════════════════
async function loadResources() {
    const search = document.getElementById('search').value.toLowerCase().trim();

    const { data, error } = await sb
        .from('resources')
        .select('*')
        .order('id', { ascending: true });

    if (error) {
        toast('Ошибка загрузки: ' + error.message, 'err');
        return;
    }

    allResources = data ?? [];

    const filtered = allResources.filter(i => {
        const matchCat = currentCat === 'all' || i.category === currentCat;
        const matchQ   = i.title.toLowerCase().includes(search);
        return matchCat && matchQ;
    });

    renderStats(allResources);
    render(filtered);
}

// ═══════════════════════════════════════════════════════
//  СТАТИСТИКА ВВЕРХУ
// ═══════════════════════════════════════════════════════
function renderStats(data) {
    const total   = data.reduce((s, i) => s + (i.count || 0), 0);
    const empty   = data.filter(i => (i.count || 0) <= 0).length;
    const expiring= data.filter(i => EXPIRY[i.title]).length;

    document.getElementById('stats-bar').innerHTML = `
        <div class="stat-chip">Всего единиц: <b>${total}</b></div>
        <div class="stat-chip">Позиций: <b>${data.length}</b></div>
        <div class="stat-chip">Пустых: <b style="color:var(--red)">${empty}</b></div>
        <div class="stat-chip">С гниением: <b style="color:var(--amber)">${expiring}</b></div>
    `;
}

// ═══════════════════════════════════════════════════════
//  РЕНДЕР КАРТОЧЕК
// ═══════════════════════════════════════════════════════
function getRecipeText(recipe) {
    if (!recipe) return null;
    const parts = [];
    for (const [id, qty] of Object.entries(recipe)) {
        const res = allResources.find(r => r.id === parseInt(id));
        parts.push(`${res ? res.title : `#${id}`} × ${qty}`);
    }
    return parts.join('\n');
}

function canCraft(recipe) {
    if (!recipe) return false;
    for (const [id, qty] of Object.entries(recipe)) {
        const res = allResources.find(r => r.id === parseInt(id));
        if (!res || (res.count || 0) < qty) return false;
    }
    return true;
}

function getCountClass(n) {
    if (n <= 0) return 'zero';
    if (n <= 2) return 'warn';
    return 'ok';
}

function render(items) {
    const grid = document.getElementById('grid');

    if (!items.length) {
        grid.innerHTML = '<div class="loading">Ничего не найдено</div>';
        return;
    }

    grid.innerHTML = items.map(item => {
        const emoji     = ITEM_EMOJI[item.title] || CATEGORY_EMOJI[item.category] || '📦';
        const expDays   = EXPIRY[item.title];
        const recipeText= getRecipeText(item.recipe);
        const craftable = canCraft(item.recipe);

        const imgHtml = item.image_url && !item.image_url.startsWith('images/')
            ? `<img src="${item.image_url}" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
            : '';

        return `
        <div class="card ${expDays ? '' : ''}">
            <div class="card-top">
                <div class="card-icon">
                    ${imgHtml}
                    <span ${imgHtml ? 'style="display:none"' : ''}>${emoji}</span>
                </div>
                <div class="card-info">
                    <div class="card-title">${item.title}</div>
                    ${expDays
                        ? `<span class="badge amber">⏳ ${expDays} дн.</span>`
                        : item.recipe
                            ? `<span class="badge blue">⚗️ Крафт</span>`
                            : `<span class="badge green">✓ Ресурс</span>`
                    }
                </div>
            </div>

            ${recipeText ? `
            <div class="recipe-hint">
                <b>Рецепт:</b><br>
                ${recipeText.split('\n').join('<br>')}
                ${!craftable && isAdmin
                    ? '<br><span style="color:var(--red)">⚠ Недостаточно ресурсов</span>'
                    : ''}
            </div>` : ''}

            <div class="card-bottom">
                <div class="count ${getCountClass(item.count || 0)}">${item.count ?? 0}</div>

                ${isAdmin ? `
                <div class="actions">
                    <button class="btn sm green" onclick="handleAction(${item.id}, 'add')">+ Сдали</button>
                    ${item.recipe
                        ? `<button class="btn sm blue" onclick="handleAction(${item.id}, 'craft')"
                             ${!craftable ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''}>
                             ⚗ Крафт</button>`
                        : `<button class="btn sm red" onclick="handleAction(${item.id}, 'sub')"
                             ${(item.count || 0) <= 0 ? 'disabled style="opacity:.4;cursor:not-allowed"' : ''}>
                             − Взяли</button>`
                    }
                </div>` : ''}
            </div>
        </div>`;
    }).join('');
}

// ═══════════════════════════════════════════════════════
//  ДЕЙСТВИЯ
// ═══════════════════════════════════════════════════════
async function handleAction(itemId, mode) {
    if (!isAdmin) return;

    const item = allResources.find(r => r.id === itemId);
    if (!item) return;

    if (mode === 'add') {
        const { error } = await sb.rpc('update_resource_safe', { res_id: item.id, delta: 1 });
        if (error) { toast('Ошибка: ' + error.message, 'err'); return; }
        if (EXPIRY[item.title]) {
            await sb.from('expiring_items').insert({ resource_id: item.id });
        }
        toast(`✅ +1 ${item.title}`);

    } else if (mode === 'craft') {
        if (!canCraft(item.recipe)) { toast('⚠ Недостаточно ресурсов для крафта', 'err'); return; }
        for (const [id, qty] of Object.entries(item.recipe)) {
            await sb.rpc('update_resource_safe', { res_id: parseInt(id), delta: -qty });
        }
        await sb.rpc('update_resource_safe', { res_id: item.id, delta: 1 });
        toast(`⚗️ Скрафчено: ${item.title}`, 'info');

    } else if (mode === 'sub') {
        if ((item.count || 0) <= 0) { toast('Нечего вычитать!', 'err'); return; }
        const { error } = await sb.rpc('update_resource_safe', { res_id: item.id, delta: -1 });
        if (error) { toast('Ошибка: ' + error.message, 'err'); return; }
        toast(`📤 −1 ${item.title}`, 'info');
    }

    await loadResources();
}

// ═══════════════════════════════════════════════════════
//  REALTIME ПОДПИСКА
// ═══════════════════════════════════════════════════════
function subscribeRealtime() {
    sb.channel('resources-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'resources' },
            () => { loadResources(); })
        .subscribe();
}

// ═══════════════════════════════════════════════════════
//  КАТЕГОРИИ И РОЛЬ
// ═══════════════════════════════════════════════════════
function setCategory(cat) {
    currentCat = cat;
    document.querySelectorAll('.tab').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === cat);
    });
    loadResources();
}

function toggleRole() {
    isAdmin = !isAdmin;
    const el = document.getElementById('role-text');
    el.textContent  = isAdmin ? 'Админ' : 'Зритель';
    el.style.color  = isAdmin ? 'var(--green)' : 'var(--muted)';
    toast(isAdmin ? '🔑 Режим администратора' : '👁 Режим просмотра', 'info');
    loadResources();
}

// ═══════════════════════════════════════════════════════
//  СТАРТ
// ═══════════════════════════════════════════════════════
init();
</script>
</body>
</html>
